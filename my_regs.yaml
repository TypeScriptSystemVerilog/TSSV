name: myRegs
wordSize: 32
registers:
  CTRL:
    address: "0x000"
    type: RW
    reset: "0x00000000"
    description: Control register
    fields:
      ENABLE:  { bits: "0:0",  reset: "0x0", description: Enable }
      MODE:    { bits: "3:1",  reset: "0x0", description: Mode select }
  STATUS:
    address: "0x004"
    type: RO
    description: Status register
  COUNT:
    address: "0x010"      # intentional alignment
    type: RW
    description: Event counter